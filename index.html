<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RNLI Atlantic 85 Training</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#002B5C">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="A85 Training">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<meta name="mobile-web-app-capable" content="yes">
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800&family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet">
<style>

*{margin:0;padding:0;box-sizing:border-box}
:root{
--navy:#002B5C;--navy-dark:#001B3D;--navy-light:#003F7F;
--orange:#E86826;--orange-light:#F4A261;--orange-dark:#C5531A;--orange-glow:rgba(232,104,38,0.15);
--port:#DC2626;--port-light:#FEE2E2;--port-bg:rgba(220,38,38,0.08);
--stbd:#059669;--stbd-light:#D1FAE5;--stbd-bg:rgba(5,150,105,0.08);
--white:#FFFFFF;--off-white:#F8F9FB;--grey-50:#F1F3F5;
--grey-100:#E8EBED;--grey-200:#D1D5DB;--grey-300:#9CA3AF;
--grey-400:#6B7280;--grey-500:#4B5563;--grey-600:#374151;
--radius:8px;--radius-lg:12px;
--shadow:0 2px 8px rgba(0,43,92,0.08);
--shadow-md:0 4px 12px rgba(0,43,92,0.12);
--shadow-lg:0 8px 24px rgba(0,43,92,0.15);
--font:'Barlow',sans-serif;
--font-cond:'Barlow Condensed',sans-serif;
}
body{font-family:var(--font);background:var(--off-white);color:var(--grey-600);line-height:1.6;min-height:100vh;overflow-x:hidden;padding-top:67px}
html{overflow-x:hidden}
*,*::before,*::after{max-width:100vw}
h1,h2,h3,h4{font-family:var(--font-cond);color:var(--navy);line-height:1.2;font-weight:700}

/* NAVBAR - Bold orange stripe */
.navbar{background:#0A3A6B;color:var(--white);padding:0 24px;height:64px;display:flex;align-items:center;justify-content:space-between;position:fixed;top:0;left:0;right:0;z-index:100;border-bottom:3px solid var(--orange)}
.nav-brand{display:flex;align-items:center;gap:12px;cursor:pointer;text-decoration:none;color:var(--white)}
.nav-brand .nav-logo{height:40px;width:auto;object-fit:contain}
.nav-brand span{font-family:var(--font-cond);font-size:1.2rem;font-weight:700;letter-spacing:0.03em}
.nav-brand small{font-size:0.72rem;font-weight:400;opacity:0.7;display:block;margin-top:-2px;color:var(--orange-light)}
.nav-actions{display:flex;gap:8px;align-items:center}
.nav-btn{background:rgba(232,104,38,0.15);border:1px solid rgba(232,104,38,0.3);color:var(--white);padding:7px 16px;border-radius:var(--radius);cursor:pointer;font-size:0.85rem;font-family:var(--font);font-weight:600;transition:all 0.2s}
.nav-btn:hover{background:var(--orange);border-color:var(--orange)}

/* BREADCRUMB */
.breadcrumb{background:var(--white);border-bottom:1px solid var(--grey-100);padding:10px 24px;font-size:0.85rem;color:var(--grey-400)}
.breadcrumb a{color:var(--orange);text-decoration:none;cursor:pointer;font-weight:500}
.breadcrumb a:hover{text-decoration:underline}
.breadcrumb span.sep{margin:0 8px;color:var(--grey-200)}

/* MAIN */
.container{max-width:1200px;margin:0 auto;padding:24px;box-sizing:border-box;width:100%}

/* HOME HEADER - Bold orange gradient */
.home-header{text-align:center;padding:48px 20px 36px;background:linear-gradient(135deg,var(--navy) 0%,var(--navy-dark) 40%,#0A1628 100%);color:var(--white);margin:-24px -24px 30px;border-radius:0 0 var(--radius-lg) var(--radius-lg);position:relative;overflow:hidden;box-sizing:content-box}
.home-header::before{content:'';position:absolute;top:-50%;right:-20%;width:60%;height:200%;background:radial-gradient(ellipse,rgba(232,104,38,0.12) 0%,transparent 70%);pointer-events:none}
.home-header h1{font-size:2.4rem;margin-bottom:8px;font-family:var(--font-cond);letter-spacing:0.03em;position:relative;text-shadow:0 2px 12px rgba(0,0,0,0.4),0 1px 2px rgba(0,0,0,0.3);font-weight:800}
.home-header p{opacity:0.92;font-size:0.95rem;max-width:600px;margin:0 auto;position:relative;text-shadow:0 1px 4px rgba(0,0,0,0.3)}

/* TRACK COLUMNS */
.track-columns{display:grid;grid-template-columns:1fr 1fr;gap:24px}
@media(max-width:768px){.track-columns{grid-template-columns:1fr}}
.track-col{background:var(--white);border-radius:var(--radius-lg);box-shadow:var(--shadow);overflow:hidden;border:1px solid var(--grey-100)}
.track-header{padding:16px 20px;font-size:1.05rem;font-weight:700;color:var(--white);display:flex;align-items:center;gap:10px;font-family:var(--font-cond);letter-spacing:0.04em;text-transform:uppercase}
.track-header svg{width:22px;height:22px;flex-shrink:0}
.track-header.shore{background:linear-gradient(135deg,var(--port),#991B1B)}
.track-header.boat{background:linear-gradient(135deg,var(--stbd),#047857)}

/* ROLE CARDS */
.role-section{padding:10px 16px;border-bottom:1px solid var(--grey-50)}
.role-section:last-child{border-bottom:none}
.role-header{display:flex;align-items:center;justify-content:space-between;cursor:pointer;padding:10px 8px;border-radius:var(--radius);transition:all 0.15s}
.role-header:hover{background:var(--orange-glow)}
.role-header h3{font-size:0.95rem;font-family:var(--font);font-weight:600;color:var(--navy)}
.role-stage{font-size:0.68rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--orange);font-weight:700;margin-bottom:2px}
.role-badge{display:flex;align-items:center;gap:6px}
.role-progress{font-size:0.78rem;color:var(--grey-300);font-weight:600}
.check-icon{color:var(--stbd);display:flex}
.module-list{padding:4px 0 4px 20px}
.module-item{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;border-radius:var(--radius);cursor:pointer;transition:all 0.15s;font-size:0.88rem;color:var(--grey-500);border-left:3px solid transparent;margin:2px 0}
.module-item:hover{background:var(--orange-glow);border-left-color:var(--orange);color:var(--navy)}
.module-item .mod-id{font-size:0.72rem;color:var(--grey-300);font-weight:600;min-width:44px;font-family:var(--font-cond)}

/* PAGE HEADER */
.page-header{background:var(--white);border-radius:var(--radius-lg);box-shadow:var(--shadow);padding:28px 30px;margin-bottom:20px;border-left:4px solid var(--orange)}
.page-header h1{font-size:1.5rem;margin-bottom:4px}
.page-header .stage-tag{display:inline-block;background:var(--orange);color:var(--white);font-size:0.7rem;text-transform:uppercase;letter-spacing:0.08em;padding:4px 12px;border-radius:12px;font-weight:700;margin-bottom:10px;font-family:var(--font-cond)}
.page-header .desc{color:var(--grey-400);font-size:0.95rem;line-height:1.6;margin-top:8px}

/* ACTION BUTTONS */
.actions{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin:20px 0}
.action-btn{display:flex;align-items:center;gap:12px;padding:18px 20px;background:var(--white);border:2px solid var(--grey-100);border-radius:var(--radius-lg);cursor:pointer;transition:all 0.2s;text-align:left;font-family:inherit}
.action-btn:hover{border-color:var(--orange);box-shadow:var(--shadow-md);transform:translateY(-2px)}
.action-btn .icon{width:44px;height:44px;border-radius:var(--radius);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.action-btn .icon.notes{background:var(--navy);color:var(--white)}
.action-btn .icon.quiz{background:var(--orange);color:var(--white)}
.action-btn .icon.continuous{background:var(--stbd);color:var(--white)}
.action-btn .label{font-weight:700;color:var(--navy);font-size:0.95rem}
.action-btn .sublabel{font-size:0.8rem;color:var(--grey-300);margin-top:2px}
.action-btn.disabled{opacity:0.35;cursor:not-allowed;pointer-events:none}


/* BACK BAR */
.back-bar{margin-bottom:12px}
.back-link{color:var(--orange);cursor:pointer;font-size:0.88rem;font-weight:600;display:inline-flex;align-items:center;gap:6px}
.back-link:hover{text-decoration:underline}

/* ROLE TAGS */
.role-tags{display:flex;flex-wrap:wrap;gap:6px;margin:10px 0 0}
.role-tag{font-size:0.72rem;font-weight:700;padding:4px 12px;border-radius:12px;text-transform:uppercase;letter-spacing:0.05em;font-family:var(--font-cond)}
.role-tag.shore{background:var(--port-bg);color:var(--port);border:1px solid rgba(220,38,38,0.2)}
.role-tag.boat{background:var(--stbd-bg);color:var(--stbd);border:1px solid rgba(5,150,105,0.2)}
.role-tag.shared{background:rgba(0,43,92,0.08);color:var(--navy);border:1px solid rgba(0,43,92,0.2)}
.role-tag.current{background:var(--orange);color:var(--white);border:1px solid var(--orange-dark)}

/* ===== NOTES ===== */
.notes-container{background:var(--white);border-radius:var(--radius-lg);box-shadow:var(--shadow);padding:36px 40px;line-height:1.8;font-size:0.95rem;color:var(--grey-500);overflow-x:auto;max-width:100%;box-sizing:border-box}
@media(max-width:768px){.notes-container{padding:20px 16px}}
.notes-container h2{font-size:1.2rem;margin:32px 0 12px;color:var(--navy);border-left:4px solid var(--orange);padding-left:14px;font-family:var(--font-cond)}
.notes-container h3{font-size:1.05rem;margin:26px 0 10px;color:var(--navy);font-family:var(--font-cond)}
.notes-container h4{font-size:0.88rem;margin:20px 0 8px;color:var(--orange);font-family:var(--font-cond);text-transform:uppercase;letter-spacing:0.05em}
.notes-container p{margin-bottom:14px;overflow-wrap:break-word;word-wrap:break-word}
.notes-container strong{color:var(--navy)}
.notes-container em{color:var(--grey-400)}
.notes-container blockquote{border-left:4px solid var(--orange);padding:14px 20px;background:var(--orange-glow);margin:18px 0;border-radius:0 var(--radius) var(--radius) 0}
.notes-container blockquote strong{color:var(--orange-dark)}
.notes-container table{width:100%;border-collapse:separate;border-spacing:0;margin:18px 0;font-size:0.88rem;border:1px solid var(--grey-100);border-radius:var(--radius);overflow:hidden;display:block;overflow-x:auto;white-space:normal}
.notes-container th{background:var(--navy);color:var(--white);padding:12px 16px;text-align:left;font-weight:700;font-size:0.78rem;text-transform:uppercase;letter-spacing:0.05em;font-family:var(--font-cond)}
.notes-container th strong{color:var(--white)}
.notes-container td{padding:11px 16px;border-bottom:1px solid var(--grey-100);vertical-align:top}
.notes-container tr:nth-child(even) td{background:var(--grey-50)}
.notes-container ul,.notes-container ol{margin:8px 0 16px;padding-left:24px}
.notes-container li{margin-bottom:7px;padding-left:4px}
.notes-container li::marker{color:var(--orange)}
.notes-container hr{border:none;border-top:2px solid var(--grey-100);margin:24px 0}
.notes-container .source-ref{font-size:0.78rem;color:var(--grey-300);font-style:italic;display:block;margin:6px 0 16px;padding-left:14px;border-left:2px solid var(--grey-100)}
.notes-source{font-size:0.82rem;color:var(--grey-300);margin-top:28px;padding-top:16px;border-top:2px solid var(--grey-100)}
.learn-box{background:linear-gradient(135deg,var(--orange-dark),var(--orange));color:var(--white);border-radius:var(--radius-lg);padding:22px 26px;margin:20px 0 28px;box-shadow:0 4px 16px rgba(232,104,38,0.3)}
.learn-box h4{color:var(--white)!important;margin:0 0 12px!important;font-size:0.82rem!important;letter-spacing:0.08em!important;opacity:0.9;border:none!important;padding:0!important}
.learn-box ol{color:rgba(255,255,255,0.95);margin:0;padding-left:22px}
.learn-box li{margin-bottom:5px;font-size:0.9rem}
.learn-box li::marker{color:rgba(255,255,255,0.7)}

/* PROCEDURE STEPS BOX */
.steps-box{background:linear-gradient(135deg,#F0F7FF,#E8F0FE);border:2px solid #B8D4F0;border-radius:var(--radius-lg);padding:24px 28px;margin:20px 0 28px;position:relative}
.steps-box::before{content:'PROCEDURE';position:absolute;top:-10px;left:20px;background:var(--navy);color:var(--white);font-size:0.68rem;font-weight:800;padding:3px 14px;border-radius:10px;letter-spacing:0.1em;font-family:var(--font-cond)}
.steps-box .step{display:flex;gap:14px;margin:12px 0;align-items:flex-start}
.steps-box .step-num{min-width:32px;height:32px;background:var(--navy);color:var(--white);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:0.85rem;font-family:var(--font-cond);flex-shrink:0;margin-top:2px}
.steps-box .step-text{color:var(--grey-600);font-size:0.92rem;line-height:1.6}
.steps-box .step-text strong{color:var(--navy)}

/* WARNING BOX */
.warn-box{background:linear-gradient(135deg,#FEF2F2,#FEE2E2);border-left:5px solid var(--port);border-radius:0 var(--radius) var(--radius) 0;padding:16px 20px;margin:18px 0;position:relative}
.warn-box::before{content:'⚠ WARNING';font-size:0.72rem;font-weight:800;color:var(--port);letter-spacing:0.08em;font-family:var(--font-cond);display:block;margin-bottom:8px}
.warn-box p{color:#991B1B;margin-bottom:6px;font-size:0.9rem;line-height:1.6}
.warn-box p:last-child{margin-bottom:0}
.warn-box strong{color:#7F1D1D}

/* INFO BOX */
.info-box{background:linear-gradient(135deg,#F0F7FF,#E8F0FE);border-left:5px solid var(--navy);border-radius:0 var(--radius) var(--radius) 0;padding:16px 20px;margin:18px 0}
.info-box::before{content:'ℹ KEY INFORMATION';font-size:0.72rem;font-weight:800;color:var(--navy);letter-spacing:0.08em;font-family:var(--font-cond);display:block;margin-bottom:8px}
.info-box p{color:var(--navy-light);margin-bottom:6px;font-size:0.9rem;line-height:1.6}
.info-box p:last-child{margin-bottom:0}

/* KEY FACT BOX */
.fact-box{background:var(--orange-glow);border:2px solid rgba(232,104,38,0.2);border-radius:var(--radius-lg);padding:16px 20px;margin:18px 0}
.fact-box-title{font-size:0.72rem;font-weight:800;color:var(--orange);letter-spacing:0.08em;font-family:var(--font-cond);margin-bottom:8px;text-transform:uppercase}
.fact-box p{color:var(--grey-600);margin-bottom:6px;font-size:0.9rem}

/* ACRONYM BOX */
.acro-box{background:var(--grey-50);border:2px solid var(--grey-200);border-radius:var(--radius-lg);padding:20px 24px;margin:20px 0}
.acro-box-title{font-size:1.1rem;font-weight:800;color:var(--navy);letter-spacing:0.04em;font-family:var(--font-cond);margin-bottom:14px}
.acro-item{display:flex;gap:10px;margin:8px 0;align-items:baseline}
.acro-letter{font-size:1.3rem;font-weight:800;color:var(--orange);font-family:var(--font-cond);min-width:28px;text-align:center}
.acro-dash{color:var(--grey-300);font-weight:400}
.acro-desc{color:var(--grey-600);font-size:0.92rem;line-height:1.5}
.acro-desc strong{color:var(--navy)}

/* DIAGRAM BOX */
.diagram-box{background:var(--grey-50);border:1px solid var(--grey-200);border-radius:var(--radius-lg);padding:20px;margin:20px 0;text-align:center}
.diagram-box svg{max-width:100%;height:auto}
.diagram-box .diagram-caption{font-size:0.8rem;color:var(--grey-400);margin-top:12px;font-style:italic}

/* MEMORY AID */
.memory-box{background:linear-gradient(135deg,#F5F3FF,#EDE9FE);border:2px solid #C4B5FD;border-radius:var(--radius-lg);padding:18px 22px;margin:18px 0}
.memory-box::before{content:'💡 MEMORY AID';font-size:0.72rem;font-weight:800;color:#7C3AED;letter-spacing:0.08em;font-family:var(--font-cond);display:block;margin-bottom:8px}
.memory-box p{color:#5B21B6;margin-bottom:6px;font-size:0.9rem}

/* CHECKLIST */
.check-list{margin:14px 0;padding:0;list-style:none}
.check-list li{position:relative;padding:6px 0 6px 30px;border-bottom:1px solid var(--grey-100);font-size:0.9rem;color:var(--grey-500)}
.check-list li:last-child{border-bottom:none}
.check-list li::before{content:'☐';position:absolute;left:4px;top:6px;font-size:1.1rem;color:var(--orange)}

/* TWO COLUMN */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin:16px 0}
@media(max-width:768px){.two-col{grid-template-columns:1fr}}

/* ===== QUIZ ===== */
.quiz-container{max-width:720px;margin:0 auto}
.quiz-progress{background:var(--white);border-radius:var(--radius-lg);box-shadow:var(--shadow);padding:16px 20px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
.quiz-progress .q-num{font-weight:800;color:var(--navy);font-size:1.1rem;font-family:var(--font-cond)}
.quiz-progress .q-bar{flex:1;margin:0 16px;height:6px;background:var(--grey-100);border-radius:3px;overflow:hidden}
.quiz-progress .q-bar-fill{height:100%;background:linear-gradient(90deg,var(--orange),var(--orange-light));border-radius:3px;transition:width 0.3s}
.quiz-progress .q-score{font-size:0.85rem;color:var(--grey-300);font-weight:600}
.quiz-card{background:var(--white);border-radius:var(--radius-lg);box-shadow:var(--shadow-md);padding:30px;margin-bottom:16px;border-top:3px solid var(--orange)}
.quiz-card .question{font-size:1.1rem;font-weight:700;color:var(--navy);margin-bottom:22px;line-height:1.5;font-family:var(--font)}
.option{display:block;width:100%;padding:14px 18px;margin:8px 0;border:2px solid var(--grey-100);border-radius:var(--radius);cursor:pointer;text-align:left;font-size:0.95rem;font-family:inherit;background:var(--white);transition:all 0.15s;color:var(--grey-600)}
.option:hover:not(.locked){border-color:var(--orange);background:var(--orange-glow)}
.option.selected{border-color:var(--orange);background:var(--orange-glow);color:var(--navy);font-weight:600}
.option.correct{border-color:var(--stbd);background:var(--stbd-light);color:#047857}
.option.incorrect{border-color:var(--port);background:var(--port-light);color:var(--port)}
.option .opt-letter{display:inline-flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:50%;background:var(--grey-50);color:var(--grey-400);font-weight:800;font-size:0.85rem;margin-right:12px;flex-shrink:0;transition:all 0.15s;font-family:var(--font-cond)}
.option.selected .opt-letter{background:var(--orange);color:var(--white)}
.option.correct .opt-letter{background:var(--stbd);color:var(--white)}
.option.incorrect .opt-letter{background:var(--port);color:var(--white)}
.explanation{margin-top:18px;padding:16px 20px;border-radius:var(--radius);font-size:0.9rem;line-height:1.6}
.explanation.correct-exp{background:var(--stbd-light);color:#065F46;border-left:4px solid var(--stbd)}
.explanation.incorrect-exp{background:var(--port-light);color:#991B1B;border-left:4px solid var(--port)}
.quiz-nav{display:flex;gap:12px;justify-content:space-between}
.q-btn{padding:12px 24px;border-radius:var(--radius);border:none;cursor:pointer;font-family:var(--font);font-weight:700;font-size:0.9rem;transition:all 0.2s;display:flex;align-items:center;gap:6px}
.q-btn:disabled{opacity:0.35;cursor:not-allowed}
.q-btn.primary{background:var(--navy);color:var(--white)}
.q-btn.primary:hover:not(:disabled){background:var(--navy-light)}
.q-btn.secondary{background:var(--grey-100);color:var(--grey-500)}
.q-btn.secondary:hover:not(:disabled){background:var(--grey-200)}
.q-btn.orange{background:var(--orange);color:var(--white)}
.q-btn.orange:hover:not(:disabled){background:var(--orange-dark)}
.q-btn.exit{background:var(--grey-100);color:var(--grey-400)}
.q-btn.exit:hover{background:var(--port-light);color:var(--port)}

/* CONTINUOUS */
.cont-score{background:var(--white);border-radius:var(--radius-lg);box-shadow:var(--shadow);padding:16px 24px;margin-bottom:16px;display:flex;justify-content:space-around;text-align:center}
.cont-stat .val{font-size:1.5rem;font-weight:800;color:var(--navy);font-family:var(--font-cond)}
.cont-stat .lbl{font-size:0.75rem;color:var(--grey-300);text-transform:uppercase;letter-spacing:0.06em;font-weight:600}
.cont-divider{width:1px;background:var(--grey-100);margin:0 8px}

/* RESULTS */
.results-card{background:var(--white);border-radius:var(--radius-lg);box-shadow:var(--shadow-lg);padding:36px;text-align:center}
.results-score{font-size:3.5rem;font-weight:800;font-family:var(--font-cond);margin:16px 0}
.results-score.pass{color:var(--stbd)}
.results-score.fail{color:var(--port)}
.results-label{font-size:1rem;color:var(--grey-400);margin-bottom:20px;font-weight:600}
.results-bar{height:10px;background:var(--grey-100);border-radius:5px;margin:16px 0}
.results-bar-fill{height:100%;border-radius:5px;transition:width 0.5s}
.results-bar-fill.pass{background:linear-gradient(90deg,var(--stbd),#34D399)}
.results-bar-fill.fail{background:linear-gradient(90deg,var(--port),#F87171)}
.results-breakdown{text-align:left;margin-top:24px;border-top:2px solid var(--grey-100);padding-top:20px}
.results-breakdown h3{font-size:1rem;margin-bottom:12px;color:var(--port);font-family:var(--font-cond)}

<body>
<div id="app"></div>

<!-- DATA FILES: edit these JS files to update questions, notes, and pathways -->
<script src="questions.js"></script>
<script src="notes.js"></script>
<script src="config.js"></script>

<script>
// ============================================================
// DATA LOADING
// ============================================================
// All training content is stored in separate JS files for
// easy editing. Update questions.js, notes.js, or config.js
// independently without touching the application code.
//
// FILE STRUCTURE:
//   questions.js  — Quiz questions (array of objects)
//   notes.js      — Module revision notes (keyed by module ID)
//   config.js     — Module names and role/pathway definitions
//   index.html    — This file (application logic + styling)
// ============================================================

const QUESTIONS    = Q_DATA;
const NOTES_RAW    = NOTES_DATA;
const MODULE_NAMES = CONFIG_DATA.moduleNames;
const ROLES        = CONFIG_DATA.roles;

const RNLI_LOGO = 'https://www.lymingtonseafoodfestival.co.uk/wp-content/uploads/2023/11/logo-RNLI-white.png';

// ============================================================
// APPLICATION CODE
// ============================================================

// QUESTIONS, MODULE_NAMES, ROLES, NOTES_RAW are loaded from JS files before this code runs

// Build question index by module
const Q_BY_MODULE = {};
QUESTIONS.forEach(q => {
if (!Q_BY_MODULE[q.moduleId]) Q_BY_MODULE[q.moduleId] = [];
Q_BY_MODULE[q.moduleId].push(q);
});


// ============================================================
// HELPERS
// ============================================================

function getQuestionsForModule(id) { return Q_BY_MODULE[id] || []; }
function getQuestionsForRole(id) { const r=ROLES.find(x=>x.id===id); if(!r) return []; let qs=[]; r.modules.forEach(m=>{qs=qs.concat(getQuestionsForModule(m));}); return qs; }
function getModuleRoles(id) { let roles=ROLES.filter(r => r.modules.includes(id)); const hasS1=roles.some(r=>r.id==='s1'), hasB1=roles.some(r=>r.id==='b1'); if(hasS1&&hasB1) roles=roles.filter(r=>r.id!=='b1'); return roles; }

// ============================================================
// ROUTER — Clean path-style hashes
// ============================================================
let currentRoute = {page:'home'};

function navigate(route) {
  currentRoute = route;
  window.location.hash = routeToHash(route);
  render();
  window.scrollTo(0,0);
}

function routeToHash(r) {
  switch(r.page) {
    case 'role': return '/role/' + r.roleId;
    case 'module': return '/module/' + r.moduleId + (r.roleId ? '/' + r.roleId : '');
    case 'notes': return '/notes/' + r.moduleId + (r.roleId ? '/' + r.roleId : '');
    case 'quiz': return '/quiz/' + (r.type||'module') + '/' + (r.id||'');
    case 'continuous': return '/continuous/' + (r.type||'module') + '/' + (r.id||'');
    case 'results': return '/results';
    default: return '/';
  }
}

function parseHash() {
  const h = window.location.hash.slice(1);
  if (!h || h === '/') return {page:'home'};
  // Support legacy JSON hashes
  if (h.startsWith('{')) { try { return JSON.parse(decodeURIComponent(h)); } catch(e){} return {page:'home'}; }
  const parts = h.split('/').filter(Boolean);
  switch(parts[0]) {
    case 'role': return {page:'role', roleId:parts[1]||''};
    case 'module': return {page:'module', moduleId:parts[1]||'', roleId:parts[2]||''};
    case 'notes': return {page:'notes', moduleId:parts[1]||'', roleId:parts[2]||''};
    case 'quiz': return {page:'quiz', type:parts[1]||'module', id:parts[2]||''};
    case 'continuous': return {page:'continuous', type:parts[1]||'module', id:parts[2]||''};
    case 'results': return currentRoute.page==='results' ? currentRoute : {page:'home'};
    default: return {page:'home'};
  }
}
window.addEventListener('hashchange', () => { currentRoute = parseHash(); render(); });

// ============================================================
// SHUFFLE (Fisher-Yates)
// ============================================================
function shuffle(arr) { const a=[...arr]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }

// Randomise answer order for a question
function randomiseOptions(q) {
  const entries = Object.entries(q.options);
  const shuffled = shuffle(entries);
  const letters = ['A','B','C','D'];
  const newOpts = {};
  const letterMap = {}; // old -> new
  shuffled.forEach(([oldLetter, text], i) => {
    newOpts[letters[i]] = text;
    letterMap[oldLetter] = letters[i];
  });
  const newCorrect = q.correct.map(c => letterMap[c]);
  return { ...q, options: newOpts, correct: newCorrect, _shuffled: true };
}

// ============================================================
// MARKDOWN RENDERER
// ============================================================
function renderMarkdown(md) {
if (!md) return '<p style="color:var(--grey-300);font-style:italic">No notes available for this module yet.</p>';

// Pre-process: Custom block types :::type ... :::
md = md.replace(/:::steps\n([\s\S]*?):::/g, function(match, inner) {
  let steps = inner.trim().split('\n').filter(l=>l.trim());
  let html = '<div class="steps-box">';
  steps.forEach((s,i) => {
    s = s.replace(/^\d+[\.\)]\s*/,'').trim();
    if(!s) return;
    s = s.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\*([^*]+)\*/g,'<em>$1</em>');
    html += '<div class="step"><div class="step-num">'+(i+1)+'</div><div class="step-text">'+s+'</div></div>';
  });
  return html + '</div>';
});

md = md.replace(/:::warning\n([\s\S]*?):::/g, function(match, inner) {
  let joined = inner.trim().replace(/\n/g, ' ').replace(/  +/g, ' ');
  joined = joined.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\*([^*]+)\*/g,'<em>$1</em>');
  return '<div class="warn-box"><p>' + joined + '</p></div>';
});

md = md.replace(/:::info\n([\s\S]*?):::/g, function(match, inner) {
  let joined = inner.trim().replace(/\n/g, ' ').replace(/  +/g, ' ');
  joined = joined.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\*([^*]+)\*/g,'<em>$1</em>');
  return '<div class="info-box"><p>' + joined + '</p></div>';
});

md = md.replace(/:::fact\s+(.+?)\n([\s\S]*?):::/g, function(match, title, inner) {
  let joined = inner.trim().replace(/\n/g, ' ').replace(/  +/g, ' ');
  joined = joined.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\*([^*]+)\*/g,'<em>$1</em>');
  return '<div class="fact-box"><div class="fact-box-title">'+title+'</div><p>' + joined + '</p></div>';
});

md = md.replace(/:::acronym\s+(.+?)\n([\s\S]*?):::/g, function(match, title, inner) {
  let items = inner.trim().split('\n').filter(l=>l.trim());
  let html = '<div class="acro-box"><div class="acro-box-title">'+title+'</div>';
  items.forEach(item => {
    let m = item.trim().match(/^([A-Z])\s*[—–-]\s*(.+)/);
    if(m) html += '<div class="acro-item"><span class="acro-letter">'+m[1]+'</span><span class="acro-dash">—</span><span class="acro-desc">'+m[2].replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')+'</span></div>';
    else html += '<div class="acro-item"><span class="acro-desc">'+item.trim().replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')+'</span></div>';
  });
  return html + '</div>';
});

md = md.replace(/:::memory\n([\s\S]*?):::/g, function(match, inner) {
  let joined = inner.trim().replace(/\n/g, ' ').replace(/  +/g, ' ');
  joined = joined.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\*([^*]+)\*/g,'<em>$1</em>');
  return '<div class="memory-box"><p>' + joined + '</p></div>';
});

md = md.replace(/:::diagram\s*(.*?)\n([\s\S]*?):::/g, function(match, caption, inner) {
  return '<div class="diagram-box">' + inner.trim() + (caption ? '<div class="diagram-caption">'+caption+'</div>' : '') + '</div>';
});

md = md.replace(/:::checklist\n([\s\S]*?):::/g, function(match, inner) {
  let items = inner.trim().split('\n').filter(l=>l.trim());
  return '<ul class="check-list">' + items.map(l => '<li>'+l.trim().replace(/^[-•]\s*/,'').replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')+'</li>').join('') + '</ul>';
});

// Pre-process: WHAT YOU'LL LEARN boxes
md = md.replace(/\+[-]+\+\n([\s\S]*?)\+[-]+\+/g, function(match, inner) {
  let items = [];
  for (let line of inner.split('\n')) {
    line = line.replace(/^\|/, '').replace(/\|$/, '').trim();
    if (!line) continue;
    let m = line.match(/^\d+\.\s+(.+)/);
    if (m) items.push(m[1].replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\*([^*]+)\*/g,'<em>$1</em>'));
  }
  if (!items.length) return '';
  return '\n<!--LB-->\n' + items.map(i=>'<!--LI-->'+i).join('\n') + '\n<!--/LB-->\n';
});

// Process ASCII tables (space-aligned with separator lines)
md = md.replace(/(  -[-]+  [-]+[- ]*\n)([\s\S]*?)(  -[-]+  [-]+[- ]*(?:\n|$)|(?=\n\n(?:\n|[#*>]|\+--|<!-|$)))/g, function(match, headerSep, body, closingSep) {
  let sepLine = headerSep.trim();
  let colStarts = [];
  let inCol = false;
  for (let i=0;i<sepLine.length;i++) {
    if (sepLine[i]!==' ' && !inCol) { colStarts.push(i); inCol=true; }
    else if (sepLine[i]===' ' && inCol) { inCol=false; }
  }
  if (colStarts.length < 2) return match;
  let allContent = body;
  // Remove any mid-table separator lines but keep data
  let allLines = allContent.split('\n').filter(l => !l.trim().match(/^[-\s]+$/) && l.trim().length > 0);
  if (allLines.length < 1) return match;
  let rows=[], cur=null;
  for (let line of allLines) {
    let cells = colStarts.map((s,c) => {
      let e = c < colStarts.length-1 ? colStarts[c+1] : line.length;
      return (line.substring(s,e)||'').trim();
    });
    if (cells[0] || !cur) { if(cur) rows.push(cur); cur=cells.map(c=>c); }
    else { cells.forEach((c,i) => { if(c) cur[i]=(cur[i]+' '+c).trim(); }); }
  }
  if(cur) rows.push(cur);
  if(rows.length<2) return match;
  let t='\n<table><thead><tr>'+rows[0].map(c=>'<th>'+c.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\*([^*]+)\*/g,'<em>$1</em>')+'</th>').join('')+'</tr></thead><tbody>';
  for(let r=1;r<rows.length;r++) t+='<tr>'+rows[r].map(c=>'<td>'+c.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\*([^*]+)\*/g,'<em>$1</em>')+'</td>').join('')+'</tr>';
  return t+'</tbody></table>\n';
});

// Process pipe-delimited tables (|col|col|col| format)
md = md.replace(/(?:^|\n)(\|[^\n]+\|\n\|[-|: ]+\|\n(?:\|[^\n]+\|\n?)+)/g, function(match) {
  let lines = match.trim().split('\n').filter(l => l.trim());
  if (lines.length < 3) return match;
  let headerLine = lines[0], sepLine = lines[1];
  if (!sepLine.match(/^\|[-|: ]+\|$/)) return match;
  let parseRow = (line) => line.replace(/^\|/, '').replace(/\|$/, '').split('|').map(c => c.trim());
  let headers = parseRow(headerLine);
  let t = '\n<table><thead><tr>' + headers.map(c => '<th>' + c.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>').replace(/\*([^*]+)\*/g, '<em>$1</em>') + '</th>').join('') + '</tr></thead><tbody>';
  for (let r = 2; r < lines.length; r++) {
    let cells = parseRow(lines[r]);
    t += '<tr>' + cells.map(c => '<td>' + c.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>').replace(/\*([^*]+)\*/g, '<em>$1</em>') + '</td>').join('') + '</tr>';
  }
  return t + '</tbody></table>\n';
});

let lines=md.split('\n'), result='', inList=false, listTag='ul', inBq=false, inLb=false, para='', bqBuf='';

function applyInline(s){return s.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\*([^*]+)\*/g,'<em>$1</em>');}
function flush(){if(para.trim()){result+='<p>'+applyInline(para.trim())+'</p>\n';}para='';}
function flushBq(){if(inBq){result+=applyInline(bqBuf)+'</blockquote>\n';bqBuf='';inBq=false;}}
function closeList(){if(inList){result+='</'+listTag+'>\n';inList=false;}}

for(let line of lines){
  let t=line.trim();
  if(!t){flush();closeList();flushBq();continue;}
  if(t==='<!--LB-->'){flush();closeList();result+='<div class="learn-box"><h4>What You\'ll Learn</h4><ol>\n';inLb=true;continue;}
  if(t==='<!--/LB-->'){result+='</ol></div>\n';inLb=false;continue;}
  if(t.startsWith('<!--LI-->')){result+='<li>'+t.replace('<!--LI-->','').trim()+'</li>\n';continue;}
  if(t.match(/^\+[-]+\+$/) || t.match(/^\|[\s|]*\|$/) || t.match(/^[-\s]{6,}$/)) continue;
  if(t.startsWith('<table')||t.startsWith('</table')||t.startsWith('<thead')||t.startsWith('</thead')||t.startsWith('<tbody')||t.startsWith('</tbody')||t.startsWith('<tr')||t.startsWith('</tr')||t.startsWith('<th')||t.startsWith('<td')||t.startsWith('<div ')||t.startsWith('</div>')||t.startsWith('<ul ')||t.startsWith('</ul>')||t.startsWith('<li>')||t.startsWith('<svg ')||t.startsWith('</svg')||t.startsWith('<path')||t.startsWith('<line')||t.startsWith('<circle')||t.startsWith('<rect')||t.startsWith('<text')||t.startsWith('<g ')||t.startsWith('</g>')||t.startsWith('<polygon')||t.startsWith('<ellipse')||t.startsWith('<span ')){flush();closeList();result+=t+'\n';continue;}
  if(t.match(/^#{1,4}\s/)){flush();closeList();let lv=t.match(/^(#{1,4})/)[1].length;let tx=t.replace(/^#{1,4}\s+/,'');result+='<h'+lv+'>'+applyInline(tx)+'</h'+lv+'>\n';continue;}
  if(t.match(/^---+$/)){flush();closeList();result+='<hr>\n';continue;}
  if(t.startsWith('>')){flush();closeList();let bq=t.replace(/^>\s*/,'');if(!inBq){result+='<blockquote>';inBq=true;}bqBuf+=bq+' ';continue;}
  if(inBq && !t.startsWith('>')){flushBq();}
  if(t.match(/^[-•]\s+/)){flush();if(!inList||listTag!=='ul'){closeList();result+='<ul>\n';inList=true;listTag='ul';}result+='<li>'+applyInline(t.replace(/^[-•]\s+/,''))+'</li>\n';continue;}
  if(t.match(/^\d+[\.\)]\s+/)){flush();if(!inList||listTag!=='ol'){closeList();result+='<ol>\n';inList=true;listTag='ol';}result+='<li>'+applyInline(t.replace(/^\d+[\.\)]\s+/,''))+'</li>\n';continue;}
  if(t.match(/^\*Source:/)){flush();closeList();result+='<span class="source-ref">'+t.replace(/^\*/,'').replace(/\*$/,'')+'</span>\n';continue;}
  para = para ? para+' '+t : t;
}
flush();closeList();flushBq();
return result;
}

// ============================================================
// ICONS
// ============================================================
const ICONS = {
anchor:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="5" r="3"/><line x1="12" y1="8" x2="12" y2="21"/><path d="M5 12H2a10 10 0 0020 0h-3"/></svg>',
ship:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 21c.6.5 1.2 1 2.5 1 2.5 0 2.5-2 5-2 2.5 0 2.5 2 5 2 2.5 0 2.5-2 5-2 1.3 0 1.9.5 2.5 1"/><path d="M19.38 20A11.6 11.6 0 0021 14l-9-4-9 4c0 2.9.94 5.34 2.81 7.76"/><path d="M19 13V7a2 2 0 00-2-2H7a2 2 0 00-2 2v6"/><path d="M12 1v4"/></svg>',
check:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>',
arrow:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>',

const app = () => document.getElementById('app');
function render() {
const route = currentRoute;
let html = renderNav();
switch(route.page) {
  case 'home': html += renderHome(); break;
  case 'role': html += renderRolePage(route.roleId); break;
  case 'module': html += renderModulePage(route.moduleId, route.roleId); break;
  case 'notes': html += renderNotesPage(route.moduleId, route.roleId); break;
  case 'quiz': html += renderQuizPage(route); break;
  case 'continuous': html += renderContinuousPage(route); break;
  case 'results': html += renderResultsPage(route); break;
  default: html += renderHome();
}
app().innerHTML = html;
}

// ============================================================
// QUIZ ENGINE — NO 20-QUESTION CAP, RANDOMISED ANSWERS
// ============================================================
let quizState = null;

window.startQuiz = function(type, id) {
let pool = type==='role' ? getQuestionsForRole(id) : getQuestionsForModule(id);
pool = shuffle(pool).map(q => randomiseOptions(q)); // Randomise order AND answer positions
if(pool.length > 10) pool = pool.slice(0, 10); // Cap at 10 questions
quizState = { type, id, questions:pool, current:0, answers:new Array(pool.length).fill(null) };
navigate({page:'quiz', type, id});
};

window.startContinuous = function(type, id) {
let pool = type==='role' ? getQuestionsForRole(id) : getQuestionsForModule(id);
quizState = { type, id, pool:shuffle(pool), poolIdx:0, score:0, total:0, revealed:false, answer:null, history:[] };
navigate({page:'continuous', type, id});
};

function renderQuizPage(route) {
if(!quizState||!quizState.questions) return '<div class="container"><p>No quiz loaded.</p></div>';
const qs=quizState.questions, idx=quizState.current, q=qs[idx], answered=quizState.answers[idx];
const pct=((idx+1)/qs.length*100).toFixed(0);
const answeredCount=quizState.answers.filter(a=>a!==null).length;
const label=quizState.type==='role'?(ROLES.find(r=>r.id===quizState.id)||{}).name:MODULE_NAMES[quizState.id]||quizState.id;
return `<div class="container"><div class="quiz-container">
<div class="back-bar"><span class="back-link" onclick="confirmExitQuiz()">${icon('arrow',14)} Exit Assessment</span></div>
<div class="quiz-progress">
  <span class="q-num">${idx+1} / ${qs.length}</span>
  <div class="q-bar"><div class="q-bar-fill" style="width:${pct}%"></div></div>
  <span class="q-score">${answeredCount} answered</span>
</div>
<div class="quiz-card">
  <div style="display:flex;justify-content:space-between;align-items:flex-start">
    <div style="font-size:0.72rem;color:var(--orange);margin-bottom:8px;font-weight:700;font-family:var(--font-cond);text-transform:uppercase">Module ${q.moduleId} — ${MODULE_NAMES[q.moduleId]||''}</div>
    <div style="font-size:0.68rem;color:var(--grey-300);font-weight:600;font-family:var(--font-cond);white-space:nowrap;margin-left:12px">[Q${q.id}]</div>
  </div>
  <div class="question">${q.question}</div>
  ${Object.entries(q.options).map(([k,v])=>{let cls='option';if(answered===k)cls+=' selected';
  return `<button class="${cls}" onclick="selectAnswer('${k}')"><span class="opt-letter">${k}</span>${v}</button>`;}).join('')}
</div>
<div class="quiz-nav">
  <button class="q-btn secondary" ${idx===0?'disabled':''} onclick="quizPrev()">${icon('arrow',14)} Prev</button>
  <div style="display:flex;gap:8px">
  ${idx<qs.length-1?`<button class="q-btn primary" onclick="quizNext()">Next ${icon('arrowR',14)}</button>`:`<button class="q-btn orange" onclick="finishQuiz()" ${answeredCount<qs.length?'':''}>${answeredCount<qs.length?'Finish ('+answeredCount+'/'+qs.length+' answered)':'View Results'} ${icon('arrowR',14)}</button>`}
  </div>
</div>
<div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:12px;justify-content:center">${qs.map((qq,i)=>{const a=quizState.answers[i];return `<button style="width:32px;height:32px;border-radius:var(--radius);border:2px solid ${i===idx?'var(--orange)':a?'var(--stbd)':'var(--grey-200)'};background:${i===idx?'var(--orange-glow)':a?'var(--stbd-bg)':'var(--white)'};cursor:pointer;font-size:0.75rem;font-weight:700;color:${i===idx?'var(--orange)':a?'var(--stbd)':'var(--grey-300)'};font-family:var(--font-cond)" onclick="quizJump(${i})">${i+1}</button>`;}).join('')}
</div>
<p class="keyboard-hint" style="text-align:center;font-size:0.78rem;color:var(--grey-300);margin-top:8px">Keyboard: <kbd style="background:var(--grey-50);padding:1px 6px;border-radius:3px;border:1px solid var(--grey-200);font-family:var(--font-cond)">A</kbd>-<kbd style="background:var(--grey-50);padding:1px 6px;border-radius:3px;border:1px solid var(--grey-200);font-family:var(--font-cond)">D</kbd> select · <kbd style="background:var(--grey-50);padding:1px 6px;border-radius:3px;border:1px solid var(--grey-200);font-family:var(--font-cond)">Enter</kbd> next · <kbd style="background:var(--grey-50);padding:1px 6px;border-radius:3px;border:1px solid var(--grey-200);font-family:var(--font-cond)">←</kbd><kbd style="background:var(--grey-50);padding:1px 6px;border-radius:3px;border:1px solid var(--grey-200);font-family:var(--font-cond)">→</kbd> navigate</p>
</div></div>`;
}

window.selectAnswer = function(k) { if(!quizState) return; quizState.answers[quizState.current]=k; render(); };
window.quizPrev = function() { if(quizState&&quizState.current>0){quizState.current--;render();window.scrollTo(0,0);} };
window.quizNext = function() { if(quizState&&quizState.current<quizState.questions.length-1){quizState.current++;render();window.scrollTo(0,0);} };
window.quizJump = function(i) { if(quizState){quizState.current=i;render();window.scrollTo(0,0);} };
window.confirmExitQuiz = function() { if(confirm('Exit this assessment? Progress will be lost.')){const t=quizState.type,id=quizState.id;quizState=null;if(t==='role')navigate({page:'role',roleId:id});else navigate({page:'module',moduleId:id,roleId:''});} };
window.finishQuiz = function() { if(!quizState) return; const qs=quizState.questions; const allResults=[]; qs.forEach((q,i)=>{const given=quizState.answers[i]; allResults.push({q,given,isCorrect:given&&q.correct.includes(given)});}); const correct=allResults.filter(r=>r.isCorrect).length; navigate({page:'results',correct,total:qs.length,allResults,type:quizState.type,id:quizState.id}); };

function renderResultsPage(route) {
const {correct,total,allResults,type,id,fromContinuous}=route;
const pct=Math.round(correct/total*100), pass=pct>=80;
const label=type==='role'?(ROLES.find(r=>r.id===id)||{}).name:MODULE_NAMES[id]||id;
const incorrect=allResults?allResults.filter(r=>!r.isCorrect):[];
const correctItems=allResults?allResults.filter(r=>r.isCorrect):[];
const showFilter=route.reviewFilter||'incorrect';
return `<div class="container"><div class="quiz-container">
<div class="results-card">
  <div style="font-size:0.82rem;color:var(--orange);margin-bottom:12px;text-transform:uppercase;letter-spacing:0.06em;font-weight:700;font-family:var(--font-cond)">${label} — ${fromContinuous?'Practice':'Assessment'} Results</div>
  <div class="results-score ${pass?'pass':'fail'}">${pct}%</div>
  <div class="results-label">${correct}/${total} correct ${pass?'— Pass':'— Below 80%'}</div>
  <div class="results-bar"><div class="results-bar-fill ${pass?'pass':'fail'}" style="width:${pct}%"></div></div>
  <div class="results-actions" style="margin-top:20px;margin-bottom:16px">
    ${fromContinuous?`<button class="q-btn orange" onclick="startContinuous('${type}','${id}')">Continue Practising</button>`:`<button class="q-btn orange" onclick="startQuiz('${type}','${id}')">Retake</button>`}
    <button class="q-btn secondary" onclick="navigate({page:'${type==='role'?'role':'module'}',${type==='role'?`roleId:'${id}'`:`moduleId:'${id}',roleId:''`}})">Back</button>
  </div>
  ${allResults&&allResults.length>0?`
  <div style="border-top:2px solid var(--grey-100);padding-top:16px;margin-top:8px">
    <div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap">
      <button class="q-btn ${showFilter==='incorrect'?'primary':'secondary'}" style="font-size:0.82rem;padding:8px 16px" onclick="setReviewFilter('incorrect')">Incorrect (${incorrect.length})</button>
      <button class="q-btn ${showFilter==='correct'?'primary':'secondary'}" style="font-size:0.82rem;padding:8px 16px" onclick="setReviewFilter('correct')">Correct (${correctItems.length})</button>
      <button class="q-btn ${showFilter==='all'?'primary':'secondary'}" style="font-size:0.82rem;padding:8px 16px" onclick="setReviewFilter('all')">All (${allResults.length})</button>
    </div>
    <div class="results-breakdown" style="border:none;padding:0;margin:0">
    ${(showFilter==='incorrect'?incorrect:showFilter==='correct'?correctItems:allResults).map(({q,given,isCorrect},idx)=>`
      <div class="result-item" style="border-left:4px solid ${isCorrect?'var(--stbd)':'var(--port)'};padding-left:16px;margin-bottom:12px">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
          <span style="font-size:0.72rem;font-weight:800;color:${isCorrect?'var(--stbd)':'var(--port)'};font-family:var(--font-cond);text-transform:uppercase">${isCorrect?'Correct':'Incorrect'}</span>
          <span style="font-size:0.72rem;color:var(--grey-300);font-family:var(--font-cond)">Module ${q.moduleId}</span>
          <span style="font-size:0.68rem;color:var(--grey-300);font-family:var(--font-cond);margin-left:auto">[Q${q.id}]</span>
        </div>
        <strong>${q.question}</strong>
        <div style="margin-top:6px;font-size:0.88rem">
          <div style="color:${isCorrect?'var(--stbd)':'var(--port)'}">Your answer: <strong>${given?q.options[given]:'— Not answered'}</strong></div>
          ${!isCorrect?`<div style="color:var(--stbd);margin-top:3px">Correct answer: <strong>${q.correct.map(c=>q.options[c]).join(', ')}</strong></div>`:''}
        </div>
        <em style="font-size:0.82rem;color:var(--grey-400);display:block;margin-top:6px">${q.explanation}</em>
      </div>
    `).join('')}
    </div>
  </div>
  `:'<p style="color:var(--stbd);font-weight:700;margin-top:20px;font-size:1.1rem">Perfect score!</p>'}
</div></div></div>`;
}
window.setReviewFilter = function(f) { currentRoute.reviewFilter=f; render(); };

// ============================================================
// CONTINUOUS MODE — RANDOMISED ANSWERS
// ============================================================
function renderContinuousPage(route) {
if(!quizState||!quizState.pool) return '<div class="container"><p>No quiz loaded.</p></div>';
let q = quizState.pool[quizState.poolIdx % quizState.pool.length];
// Randomise on first view of each question
if (!q._shuffled) { q = randomiseOptions(q); quizState.pool[quizState.poolIdx % quizState.pool.length] = q; }
const revealed=quizState.revealed, answered=quizState.answer, pct=quizState.total>0?Math.round(quizState.score/quizState.total*100):0;
return `<div class="container"><div class="quiz-container">
<div class="back-bar"><span class="back-link" onclick="exitContinuous()">${icon('arrow',14)} Exit</span></div>
<div class="cont-score">
  <div class="cont-stat"><div class="val">${quizState.score}</div><div class="lbl">Correct</div></div>
  <div class="cont-divider"></div>
  <div class="cont-stat"><div class="val">${quizState.total}</div><div class="lbl">Attempted</div></div>
  <div class="cont-divider"></div>
  <div class="cont-stat"><div class="val">${pct}%</div><div class="lbl">Accuracy</div></div>
</div>
<div class="quiz-card">
  <div style="display:flex;justify-content:space-between;align-items:flex-start">
    <div style="font-size:0.72rem;color:var(--orange);margin-bottom:8px;font-weight:700;font-family:var(--font-cond);text-transform:uppercase">Module ${q.moduleId} — ${MODULE_NAMES[q.moduleId]||''}</div>
    <div style="font-size:0.68rem;color:var(--grey-300);font-weight:600;font-family:var(--font-cond);white-space:nowrap;margin-left:12px">[Q${q.id}]</div>
  </div>
  <div class="question">${q.question}</div>
  ${Object.entries(q.options).map(([k,v])=>{let cls='option';if(revealed){cls+=' locked';if(q.correct.includes(k))cls+=' correct';else if(answered===k&&!q.correct.includes(k))cls+=' incorrect';}else if(answered===k)cls+=' selected';
  return `<button class="${cls}" onclick="contSelect('${k}')"><span class="opt-letter">${k}</span>${v}</button>`;}).join('')}
  ${revealed?`<div class="explanation ${q.correct.includes(answered)?'correct-exp':'incorrect-exp'}">${q.correct.includes(answered)?'<strong>Correct!</strong>':'<strong>Incorrect.</strong>'} ${q.explanation}</div>`:''}
</div>
<div class="quiz-nav">
  <button class="q-btn exit" onclick="exitContinuous()">${icon('x',14)} Exit</button>
  ${!revealed&&answered?`<button class="q-btn orange" onclick="contReveal()">Check Answer</button>`:revealed?`<button class="q-btn primary" onclick="contNext()">Next ${icon('arrowR',14)}</button>`:`<button class="q-btn primary" disabled>Select an answer</button>`}
</div>
<p class="keyboard-hint" style="text-align:center;font-size:0.78rem;color:var(--grey-300);margin-top:8px">Keyboard: <kbd style="background:var(--grey-50);padding:1px 6px;border-radius:3px;border:1px solid var(--grey-200);font-family:var(--font-cond)">A</kbd>-<kbd style="background:var(--grey-50);padding:1px 6px;border-radius:3px;border:1px solid var(--grey-200);font-family:var(--font-cond)">D</kbd> select · <kbd style="background:var(--grey-50);padding:1px 6px;border-radius:3px;border:1px solid var(--grey-200);font-family:var(--font-cond)">Enter</kbd> submit/next</p>
</div></div>`;
}

window.contSelect = function(k) { if(!quizState||quizState.revealed) return; quizState.answer=k; render(); };
window.contReveal = function() { if(!quizState) return; quizState.revealed=true; quizState.total++; const q=quizState.pool[quizState.poolIdx%quizState.pool.length]; const isCorrect=q.correct.includes(quizState.answer); if(isCorrect)quizState.score++; quizState.history.push({q,given:quizState.answer,isCorrect}); render(); };
window.contNext = function() { if(!quizState) return; quizState.poolIdx++; if(quizState.poolIdx>=quizState.pool.length){quizState.pool=shuffle(quizState.pool);quizState.poolIdx=0;} quizState.revealed=false; quizState.answer=null; render(); window.scrollTo(0,0); };
window.exitContinuous = function() { if(!quizState) return; const t=quizState.type,id=quizState.id,s=quizState.score,tot=quizState.total,hist=quizState.history||[]; quizState=null; if(tot>0){navigate({page:'results',correct:s,total:tot,allResults:hist,type:t,id:id,fromContinuous:true});}else{if(t==='role')navigate({page:'role',roleId:id});else navigate({page:'module',moduleId:id,roleId:''});} };

// ============================================================
// KEYBOARD SHORTCUTS
// ============================================================
document.addEventListener('keydown', function(e) {
  // Don't handle if user is typing in an input/textarea
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'||e.target.tagName==='SELECT') return;
  
  const route = currentRoute;
  
  // Quiz/Assessment mode
  if(route.page==='quiz' && quizState && quizState.questions) {
    const idx = quizState.current;
    const qs = quizState.questions;
    if(['a','b','c','d'].includes(e.key.toLowerCase())) {
      e.preventDefault();
      selectAnswer(e.key.toUpperCase());
    } else if(e.key==='Enter') {
      e.preventDefault();
      if(idx<qs.length-1) quizNext();
      else finishQuiz();
    } else if(e.key==='ArrowLeft') {
      e.preventDefault();
      quizPrev();
    } else if(e.key==='ArrowRight') {
      e.preventDefault();
      if(idx<qs.length-1) quizNext();
    }
  }
  
  // Continuous mode
  if(route.page==='continuous' && quizState && quizState.pool) {
    if(['a','b','c','d'].includes(e.key.toLowerCase()) && !quizState.revealed) {
      e.preventDefault();
      contSelect(e.key.toUpperCase());
    } else if(e.key==='Enter') {
      e.preventDefault();
      if(!quizState.revealed && quizState.answer) contReveal();
      else if(quizState.revealed) contNext();
    }
  }
});

// ============================================================
// INIT
// ============================================================
function init() { currentRoute = parseHash(); render(); }
init();

// ============================================================
// PWA — SERVICE WORKER REGISTRATION
// ============================================================
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(reg => {
        // Check for updates periodically (every 30 min)
        setInterval(() => reg.update(), 30 * 60 * 1000);
        console.log('SW registered, scope:', reg.scope);
      })
      .catch(err => console.warn('SW registration failed:', err));
  });
}

// ============================================================
// PWA — INSTALL PROMPT (Android / desktop Chrome)
// ============================================================
let deferredInstallPrompt = null;

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredInstallPrompt = e;
  // Re-render so the install button appears in the navbar
  render();
});

window.addEventListener('appinstalled', () => {
  deferredInstallPrompt = null;
  render();
});

window.installPWA = function() {
  if (!deferredInstallPrompt) return;
  deferredInstallPrompt.prompt();
  deferredInstallPrompt.userChoice.then(result => {
    deferredInstallPrompt = null;
    render();
  });
};

// ============================================================
// PWA — UPDATE NOTIFICATION
// ============================================================
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.addEventListener('controllerchange', () => {
    // New service worker took over — content may have been updated
    if (confirm('Training content has been updated. Reload now?')) {
      window.location.reload();
    }
  });
}



</script>
</body>
</html>
